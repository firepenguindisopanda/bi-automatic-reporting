# =============================================================================
# Nginx location block for BI Automatic Reporting
#
# Add this INSIDE your existing `server` block in
# `/etc/nginx/sites-available/main`, alongside the other location blocks:
#
#   location /jenkins/  { ... }
#   location /news/     { ... }
#   location /reports/  { ... }   ← add this one
#
# The app is served at  https://swepi.tail24d0db.ts.net/reports/
# =============================================================================

location /reports/ {
    proxy_pass http://127.0.0.1:8000/;

    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # LLM requests can take 2-3 minutes - don't timeout
    proxy_connect_timeout 90s;
    proxy_send_timeout 180s;
    proxy_read_timeout 180s;

    client_max_body_size 2m;
}
