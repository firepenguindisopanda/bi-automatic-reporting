services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: bi-backend:latest
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - REPORT_OUTPUT_DIR=/data/reports
      - JOBS_DB=/data/jobs.db
    volumes:
      - app_data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: bi-frontend:latest
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  app_data:
